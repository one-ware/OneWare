# Dependabot keeps dependencies patched, supporting CRA Annex I Part II
# (identify & address vulnerabilities without undue delay).
version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      avalonia:
        patterns:
          - "Avalonia*"
          - "Dock.Avalonia*"
          - "Dock.Model.Mvvm*"
          - "OneWare.Markdown.Avalonia*"
          - "OneWare.Avalonia*"
          - "PanAndZoom"
          - "Svg.Controls.Skia.Avalonia"
          - "Xaml.Behaviors.Avalonia"
      microsoft:
        patterns:
          - "Microsoft.*"
          - "System.*"
    ignore:
      - dependency-name: "Avalonia*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "Dock.Avalonia*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "Dock.Model.Mvvm*"
        update-types:
          - "version-update:semver-major"
